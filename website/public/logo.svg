<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Wings -->
  <ellipse cx="20" cy="24" rx="10" ry="7" fill="#F59E0B" opacity="0.3" transform="rotate(-20 20 24)"/>
  <ellipse cx="44" cy="24" rx="10" ry="7" fill="#F59E0B" opacity="0.3" transform="rotate(20 44 24)"/>
  <!-- Body -->
  <ellipse cx="32" cy="36" rx="12" ry="16" fill="#F59E0B"/>
  <!-- Stripes -->
  <rect x="20" y="30" width="24" height="4" rx="2" fill="#1a1a1a"/>
  <rect x="20" y="38" width="24" height="4" rx="2" fill="#1a1a1a"/>
  <!-- Head -->
  <circle cx="32" cy="18" r="8" fill="#1a1a1a"/>
  <!-- Eyes -->
  <circle cx="29" cy="16" r="2" fill="#fff"/>
  <circle cx="35" cy="16" r="2" fill="#fff"/>
  <!-- Antennae -->
  <line x1="28" y1="11" x2="22" y2="4" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <line x1="36" y1="11" x2="42" y2="4" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"/>
  <circle cx="22" cy="4" r="2" fill="#1a1a1a"/>
  <circle cx="42" cy="4" r="2" fill="#1a1a1a"/>
  <!-- Stinger -->
  <polygon points="32,52 29,56 35,56" fill="#1a1a1a"/>
</svg>
